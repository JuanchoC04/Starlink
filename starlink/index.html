<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starlink</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

  <header class="flex column flex-main-center">
    <nav class="row flex-main-space-between flex-secondary-center">

      <!-- LOGO -->

      <div class="row flex-secondary-center gap-standard">
        <h2 id="logo">STARLINK</h2>
        <a class="link-menu" href="#">Residencial</a>
        <a class="link-menu" href="#">Itinerante</a>
      </div>

      <!-- BOTONES Y MENÚ DE LA DERECHA -->

      <div class="row flex-secondary-center gap-standard">
        <div class="row flex-secondary-center buttons-menu">
          <button class="button-active">Personal</button>
          <button class="transparent button-inactive">Empresa</button>
        </div>

        <!--MENÚ-->

        <button class="circular-button">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </nav>

    <!-- TÍTULO CENTRAL Y PRECIO -->

    <div id="header-content">
      <div class="col-content flex column flex-secondary-center flex-main-center">
        <div id="column-content" class="flex column">
          <h1>
            Internet rápido y<br />
            asequible
          </h1>
          <p>DESDE</p>
          <h2>55 €<span>/mes</span></h2>
          <div class="flex gap-standard">
            <button class="button-hightlight">Empezar</button>
            <button class="button-nohightlight">Ver precios</button>
          </div>
        </div>
      </div>
    </div>
  </header>
  <!--AQUÍ EMPEZAMOS A HACER EL MAIN-->
  <main>
    <section>
      <!--AQUÍ AÑADIRÍA LA SEGUNDA SECCIÓN DONDE ESTÁN LOS PLANES DE STARLINK-->
      <h2></h2>
    </section>

    <section>
      <!--AQUÍ AÑADIRÍA LA TERCERA SECCIÓN DONDE ESTÁ LA COMPARACIÓN DE PLANES-->
      <h2></h2>
    </section>
  </main>

  <!--AQUÍ EMPEZARÍA EL FOOTER-->
  <footer>

  </footer>
</body>

</html>
